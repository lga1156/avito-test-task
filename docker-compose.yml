services:
  # Бэкенд на Fastify
  api-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      - port=8080

  # Клиент (Vite + React) раздается через Nginx
  web-client:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - api-server
